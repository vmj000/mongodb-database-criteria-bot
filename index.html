<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Database Criteria Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #00684a, #00ed64);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header img {
            height: 40px;
        }

        header h1 {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 600;
        }

        header p {
            color: rgba(255,255,255,0.85);
            font-size: 0.85rem;
        }

        .chat-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background: #16213e;
            border: 1px solid #0f3460;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: #00684a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .option-btn {
            background: #0f3460;
            border: 1px solid #1a5276;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #1a5276;
            border-color: #00ed64;
            color: #00ed64;
        }

        .option-btn.selected {
            background: #00684a;
            border-color: #00ed64;
            color: #fff;
        }

        .multi-select-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
            font-style: italic;
        }

        .submit-btn {
            background: linear-gradient(135deg, #00684a, #00ed64);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 8px;
            transition: all 0.2s;
            align-self: flex-start;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 237, 100, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Score card */
        .scorecard {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 16px;
            padding: 24px;
            margin-top: 10px;
            align-self: flex-start;
            max-width: 90%;
        }

        .score-header {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .score-bar-container {
            background: #0a0a1a;
            border-radius: 12px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
        }

        .score-bar {
            height: 100%;
            border-radius: 12px;
            transition: width 1.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .score-strong { background: linear-gradient(90deg, #00684a, #00ed64); }
        .score-good { background: linear-gradient(90deg, #00684a, #5bc0be); }
        .score-equal { background: linear-gradient(90deg, #e77f24, #f0c929); }
        .score-weak { background: linear-gradient(90deg, #c0392b, #e74c3c); }

        .score-tier {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 0 8px;
        }

        .score-tier.strong { color: #00ed64; }
        .score-tier.good { color: #5bc0be; }
        .score-tier.equal { color: #f0c929; }
        .score-tier.weak { color: #e74c3c; }

        .dropdown-toggle {
            margin-top: 16px;
            padding: 12px 16px;
            background: #0a0a1a;
            border: 1px solid #0f3460;
            border-radius: 10px;
            color: #ccc;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
        }

        .dropdown-toggle:hover {
            background: #0f3460;
            border-color: #00ed64;
        }

        .dropdown-arrow {
            color: #00ed64;
            font-size: 0.75rem;
            transition: transform 0.3s;
            display: inline-block;
        }

        .dropdown-arrow.open {
            transform: rotate(90deg);
        }

        .dropdown-content {
            display: none;
            border: 1px solid #0f3460;
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 0 16px 16px;
            background: #0a0a1a;
            margin-top: -10px;
        }

        .dropdown-content.open {
            display: block;
        }

        .score-summary {
            margin-top: 20px;
            padding: 18px;
            background: #0a0a1a;
            border-radius: 12px;
            border-left: 3px solid #00684a;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #ccc;
        }

        .score-summary strong {
            color: #fff;
            font-size: 1rem;
        }

        .score-breakdown {
            margin-top: 16px;
            border-top: 1px solid #0f3460;
            padding-top: 16px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #0a0a1a;
        }

        .breakdown-label { color: #aaa; }
        .breakdown-score { font-weight: 600; }
        .breakdown-score.positive { color: #00ed64; }
        .breakdown-score.neutral { color: #f0c929; }
        .breakdown-score.negative { color: #e74c3c; }

        .restart-btn {
            background: #0f3460;
            border: 1px solid #1a5276;
            color: #e0e0e0;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: #1a5276;
            border-color: #00ed64;
        }

        .score-detail {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* Spectrum diagram */
        .spectrum-box {
            margin-top: 20px;
            background: #0f1b2d;
            border-radius: 14px;
            padding: 28px 16px 20px;
            border: 1px solid #0f3460;
            text-align: center;
        }

        .spectrum-box svg {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>MongoDB Database Criteria Bot</h1>
            <p>Evaluate if MongoDB is the right fit for your project</p>
        </div>
    </header>
    <div class="chat-container" id="chat"></div>

    <script>
    const QUESTIONS = {
        q1: {
            id: 'q1',
            text: "Let's start! What type of project is this?",
            type: 'single',
            options: [
                { id: 'new_no_legacy', label: 'New service — no legacy dependencies', score: 8, next: 'q2' },
                { id: 'new_api_legacy', label: 'New service — integrates with legacy via APIs', score: 7.5, next: 'q2' },
                { id: 'new_shield', label: 'New top-level service to shield legacy from heavy reads/writes', score: 8, next: 'q2' },
                { id: 'new_shared_db', label: 'New service — directly shares data/DB with legacy systems', score: 5, next: 'q2' },
                { id: 'refresh', label: 'Replacement / refresh of existing service', score: 5, next: 'q1b' }
            ],
            weight: 1.0,
            category: 'Project Type'
        },
        q1b: {
            id: 'q1b',
            text: "What's driving the refresh? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'eol_legacy', label: 'End-of-life / end-of-support for legacy systems', score: 1.2 },
                { id: 'slow_perf', label: 'Slow application performance causing business impact', score: 1.5 },
                { id: 'modernise_arch', label: 'Modernising architecture (e.g., moving to cloud-native, microservices)', score: 1.5 },
                { id: 'rigid_schema', label: 'Rigid schema changes slowing development', score: 1.5 },
                { id: 'db_bottleneck', label: 'Database bottlenecks delaying delivery', score: 1.5 },
                { id: 'always_on', label: 'Need for near always-on availability', score: 1.2 },
                { id: 'faster_change', label: 'Faster reaction to regulations or market changes', score: 1.2 },
                { id: 'no_flatten', label: 'Storing semi-structured data (XML/JSON) without flattening', score: 1.5 }
            ],
            weight: 1.0,
            category: 'Refresh Drivers',
            next: 'q2',
            isBooster: true,
            boosterBase: 'q1'
        },
        q2: {
            id: 'q2',
            text: "What is the key business value of this service? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'digital_ux', label: 'Better UI / digital experience for end customers', score: 1.2 },
                { id: 'fast_response', label: 'Faster response times / low latency', score: 1.0 },
                { id: 'cost_optimisation', label: 'Reducing infrastructure or licensing costs', score: 1.0 },
                { id: 'decouple_logic', label: 'Enabling teams to ship independently without cross-team database coordination', score: 1.0 },
                { id: 'api_microservices', label: 'Exposing services via APIs / enabling a composable architecture', score: 1.0 },
                { id: 'geo_distributed', label: 'Serving customers across multiple regions with local performance', score: 1.0 },
                { id: 'erp_complex', label: 'Managing deeply interconnected business processes (e.g., ERP, supply chain, order-to-cash)', score: -2.0 },
                { id: 'heavy_transactions', label: 'Ensuring atomic consistency across many related business entities in a single operation', score: -1.0 },
                { id: 'relational_audit', label: 'Regulatory requirement for strict relational audit trails', score: -0.5 }
            ],
            weight: 1.0,
            category: 'Business Value',
            next: 'q3_router'
        },
        q3_router: {
            id: 'q3_router',
            type: 'router',
            route: function(answers) {
                const q1Answer = answers['q1'];
                if (q1Answer && q1Answer[0] === 'refresh') return 'q3b';
                return 'q3';
            }
        },
        q3: {
            id: 'q3',
            text: "For your new service — what are the key business requirements? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'ddd', label: 'Domain-driven design / architecture', score: 1.5 },
                { id: 'realtime', label: 'Real-time updates and information delivery', score: 1.2 },
                { id: 'operational_layer', label: 'Operational data layer for fast responses over cramped backend services', score: 1.5 },
                { id: 'agentic_ai', label: 'Agentic AI experience with short/long-term memory and vector stores', score: 1.5 },
                { id: 'polymorphic_store', label: 'Polymorphic data — storing varied information types in a single store', score: 1.2 },
                { id: 'complex_reporting', label: 'Complex reporting and analytics across many related entities', score: -1.5 },
                { id: 'strict_referential', label: 'Strict referential integrity enforced at the database level', score: -1.2 },
                { id: 'batch_etl', label: 'Batch processing / ETL pipelines with structured, tabular data', score: -1.0 },
                { id: 'none_q3', label: 'None of these', score: 0 }
            ],
            weight: 1.0,
            category: 'Business Requirements (New)',
            next: 'q4'
        },
        q3b: {
            id: 'q3b',
            text: "What is the target state architecture for the refresh? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'monolith_to_ddd', label: 'Moving from monolith to domain-driven / microservices architecture', score: 1.5 },
                { id: 'modular_monolith', label: 'Moving to a modular monolith with clearer domain boundaries', score: 1.0 },
                { id: 'add_realtime', label: 'Adding real-time capabilities that legacy system can\'t support', score: 1.2 },
                { id: 'offload_layer', label: 'Building an operational data layer to offload legacy backends', score: 1.5 },
                { id: 'integrate_ai', label: 'Integrating AI / agentic capabilities into existing workflows', score: 1.5 },
                { id: 'consolidate_stores', label: 'Consolidating multiple data stores into a single polymorphic store', score: 1.2 },
                { id: 'eliminate_migrations', label: 'Eliminating schema migration bottlenecks that slow releases', score: 1.2 },
                { id: 'lift_shift', label: 'Migrating relational workload as-is to a new platform (lift and shift)', score: -1.5 },
                { id: 'keep_stored_procs', label: 'Keeping existing stored procedures / DB-side business logic', score: -1.5 }
            ],
            weight: 1.0,
            category: 'Target Architecture (Refresh)',
            next: 'q4'
        },
        q4: {
            id: 'q4',
            text: "Let's look at your data and domain characteristics. (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'regulatory_changes', label: 'Frequent regulatory changes requiring rapid service adaptation', score: 1.2 },
                { id: 'status_tracking', label: 'Various entity status changes tracked frequently', score: 1.0 },
                { id: 'temporal_data', label: 'Temporal data stored (time-bound, versioned, effective-dated)', score: 1.0 },
                { id: 'few_tables_low_card', label: 'Entity data fits few tables, low cardinality — natural single document', score: 1.5 },
                { id: 'runtime_aggregations', label: 'Heavy runtime computations / aggregations on operational data', score: 1.2 },
                { id: 'schema_versioning', label: 'Schema versioning and lifecycle management is important — controlled-yet-flexible schema with tools like Liquibase (Spring Boot)', score: 1.2 },
                { id: 'odl_heavy_reads', label: 'Building an operational data layer to offload heavy reads from core systems — flexible schema allows consolidating data from multiple core systems into a single store', score: 1.8 },
                { id: 'realtime_compute', label: 'Service primarily caters to real-time pre-programmed computations', score: 1.5 },
                { id: 'highly_relational', label: 'Data is highly relational with many cross-entity joins required at query time', score: -1.5 },
                { id: 'fixed_schema', label: 'Schema is slow-changing or fixed — rarely evolves after initial design', score: -1.0 },
                { id: 'human_analytical', label: 'Service primarily caters to ad-hoc analytical querying by humans', score: -1.5 },
                { id: 'analytics_primary', label: 'Primary purpose is analytics / BI for internal analysts and data teams', score: -2.0 }
            ],
            weight: 1.0,
            category: 'Data & Domain Characteristics',
            next: 'q4b'
        },
        q4b: {
            id: 'q4b',
            text: "Are any of these patterns already present (or planned) in your architecture? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'jsonb_columns', label: 'Storing part of the data as JSON / JSONB columns in a relational database', score: 1.5 },
                { id: 'flatten_xml', label: 'Flattening XML or nested data structures into relational tables for querying', score: 1.5 },
                { id: 'computed_fields', label: 'Pre-computing and storing derived / aggregated fields to avoid expensive runtime calculations', score: 1.2 },
                { id: 'caching_layer', label: 'Using a caching layer (e.g., Redis, Memcached) in front of the database for read performance', score: 1.5 },
                { id: 'kv_offload', label: 'Using a key-value database to offload simple lookups from the primary database', score: 1.5 },
                { id: 'read_views', label: 'Creating read-optimised views or materialised tables to avoid joins at query time', score: 1.5 },
                { id: 'search_engine_bolt', label: 'Running a separate search engine (e.g., Elasticsearch, Solr) alongside the database for full-text / natural-language search', score: 1.5 },
                { id: 'none_denorm', label: 'None of the above', score: 0 }
            ],
            weight: 1.0,
            category: 'Implicit Denormalization',
            next: 'q5'
        },
        q5: {
            id: 'q5',
            text: "How about developer velocity and operational needs?",
            type: 'multi',
            options: [
                { id: 'reduce_devops', label: 'Constant ask from developers to reduce dependency on DevOps / DBA teams for data operations', score: 1.5 },
                { id: 'move_faster', label: 'Business asks to move faster even when you\'re already moving fast', score: 1.2 },
                { id: 'no_bolt_on', label: 'Want to avoid bolting on third-party tools for every database feature (e.g., separate tools for search, caching, streaming, etc.)', score: 1.5 },
                { id: 'logic_app_level', label: 'Want to control business logic at the application level', score: 1.5 },
                { id: 'logic_db_level', label: 'Want to continue using stored procedures / database-level business logic', score: -1.5 },
                { id: 'cloud_portability', label: 'Important that code runs the same on any cloud (AWS, Azure, GCP) and on-prem / private cloud if business continuity strategy changes', score: 1.5 },
                { id: 'low_change_rate', label: 'Application has a low change rate — infrequent releases and stable requirements', score: -1.0 }
            ],
            weight: 1.0,
            category: 'Developer Velocity',
            next: 'q6'
        },
        q6: {
            id: 'q6',
            text: "Does your application need any of these additional capabilities alongside operational data? (Select all that apply)",
            type: 'multi',
            options: [
                { id: 'text_search', label: 'Natural language / full-text search alongside operational data', score: 1.0 },
                { id: 'vector_search', label: 'Vector search (embeddings, similarity) alongside operational data', score: 1.0 },
                { id: 'event_streaming', label: 'Event streaming / change-driven reactions alongside operational data', score: 1.0 },
                { id: 'multiple_above', label: 'Need 2+ of the above on a single platform (consolidation play)', score: 2.0 },
                { id: 'none_required', label: 'None of these required', score: 0 }
            ],
            weight: 1.0,
            category: 'Platform Consolidation',
            next: 'done'
        }
    };

    // State
    let answers = {};
    let categoryScores = {};
    let currentQuestion = null;

    const chat = document.getElementById('chat');

    function scrollToBottom() {
        setTimeout(() => {
            chat.scrollTop = chat.scrollHeight;
        }, 50);
    }

    function addMessage(html, type = 'bot') {
        const div = document.createElement('div');
        div.className = `message ${type}-message`;
        div.innerHTML = html;
        chat.appendChild(div);
        scrollToBottom();
        return div;
    }

    function showQuestion(qId) {
        const q = QUESTIONS[qId];
        if (!q) return;

        // Handle router
        if (q.type === 'router') {
            const nextId = q.route(answers);
            showQuestion(nextId);
            return;
        }

        currentQuestion = q;

        let html = `<strong>${q.text}</strong>`;
        html += `<div class="options-container" id="options-${q.id}">`;

        q.options.forEach(opt => {
            html += `<button class="option-btn" data-id="${opt.id}" onclick="selectOption('${q.id}', '${opt.id}')">${opt.label}</button>`;
        });

        html += `</div>`;

        if (q.type === 'multi') {
            html += `<div class="multi-select-hint">Select all that apply</div>`;
            html += `<button class="submit-btn" id="submit-${q.id}" onclick="submitMulti('${q.id}')" disabled>Continue →</button>`;
        }

        const msg = addMessage(html, 'bot');
        // Scroll so the bottom of the new question is visible
        setTimeout(() => {
            msg.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }, 100);
    }

    function selectOption(qId, optId) {
        const q = QUESTIONS[qId];

        if (q.type === 'single') {
            // Single select — immediately proceed
            answers[qId] = [optId];
            const opt = q.options.find(o => o.id === optId);

            // Show user selection
            addMessage(opt.label, 'user');

            // Calculate score for this question
            calculateCategoryScore(q, [optId]);

            // Next question
            const next = opt.next || q.next;
            if (next === 'done') {
                showResults();
            } else {
                setTimeout(() => showQuestion(next), 400);
            }
        } else {
            // Multi select — toggle
            if (!answers[qId]) answers[qId] = [];
            const btn = document.querySelector(`#options-${qId} [data-id="${optId}"]`);

            if (answers[qId].includes(optId)) {
                answers[qId] = answers[qId].filter(id => id !== optId);
                btn.classList.remove('selected');
            } else {
                answers[qId].push(optId);
                btn.classList.add('selected');
            }

            // Enable/disable submit
            const submitBtn = document.getElementById(`submit-${qId}`);
            if (submitBtn) {
                submitBtn.disabled = answers[qId].length === 0;
            }
        }
    }

    function submitMulti(qId) {
        const q = QUESTIONS[qId];
        const selected = answers[qId] || [];
        if (selected.length === 0) return;

        // Disable buttons
        document.querySelectorAll(`#options-${qId} .option-btn`).forEach(btn => btn.disabled = true);
        const submitBtn = document.getElementById(`submit-${qId}`);
        if (submitBtn) submitBtn.disabled = true;

        // Show user selections
        const labels = selected.map(id => q.options.find(o => o.id === id).label);
        addMessage(labels.map(l => `• ${l}`).join('<br>'), 'user');

        // Calculate score
        calculateCategoryScore(q, selected);

        // Next
        const next = q.next;
        if (next === 'done') {
            setTimeout(() => showResults(), 500);
        } else {
            setTimeout(() => showQuestion(next), 400);
        }
    }

    function calculateCategoryScore(q, selectedIds) {
        const items = selectedIds.map(id => {
            const opt = q.options.find(o => o.id === id);
            return { label: opt.label, score: opt.score };
        });

        if (q.isBooster) {
            // Booster: compute a normalized 0-10 score for the refresh drivers
            const maxPositive = q.options.reduce((sum, o) => sum + Math.max(0, o.score), 0);
            const rawSum = items.reduce((sum, i) => sum + i.score, 0);
            // Scale: 0 drivers selected = 3 (weak refresh case), all drivers = 9
            const normalized = maxPositive > 0 ? 3 + (rawSum / maxPositive) * 6 : 3;
            categoryScores[q.category] = { raw: Math.min(normalized, 9), weight: q.weight, selected: items };
            return;
        }

        if (q.type === 'single') {
            categoryScores[q.category] = { raw: items[0].score, weight: q.weight, selected: items };
        } else {
            // Multi-select: normalize to a 0-10 scale per category
            // Positive and negative scores are normalized separately for symmetry
            const maxPositive = q.options.reduce((sum, o) => sum + Math.max(0, o.score), 0);
            const maxNegative = Math.abs(q.options.reduce((sum, o) => sum + Math.min(0, o.score), 0));

            let positiveSum = 0;
            let negativeSum = 0;
            items.forEach(i => {
                if (i.score > 0) positiveSum += i.score;
                else negativeSum += Math.abs(i.score);
            });

            // Each category scores 0-10:
            // - Start at 5 (neutral)
            // - Positive selections push toward 10
            // - Negative selections push toward 0
            // - Both are normalized against their own max so negatives have equal power
            const posInfluence = maxPositive > 0 ? (positiveSum / maxPositive) * 5 : 0;
            const negInfluence = maxNegative > 0 ? (negativeSum / maxNegative) * 5 : 0;
            const normalized = 5 + posInfluence - negInfluence;

            categoryScores[q.category] = {
                raw: Math.max(0, Math.min(10, normalized)),
                weight: q.weight,
                selected: items
            };
        }
    }

    function computeFinalScore() {
        // Scoring approach:
        // Each category (including Q1) produces a 0-10 normalized score.
        // Q1 contributes 30% of final score, remaining categories share 70%.
        // This ensures detail questions (Q2-Q6) meaningfully influence the result
        // and negative signals have real weight.

        const BASE_WEIGHT = 0.30;  // Q1 / Q1b influence
        const DETAIL_WEIGHT = 0.70; // Q2-Q6 influence

        let baseScore = 5;
        const detailScores = [];

        Object.keys(categoryScores).forEach(cat => {
            const entry = categoryScores[cat];
            if (cat === 'Project Type') {
                // Normalize Q1's 5-8 range to 0-10 scale
                // 5 (shared DB / refresh) -> 2.5, 7.5 -> 6.25, 8 -> 7.5
                baseScore = ((entry.raw - 5) / 3) * 10;
                baseScore = Math.max(0, Math.min(10, baseScore));
            } else if (cat === 'Refresh Drivers') {
                // Booster already normalized to 0-10, overrides base
                baseScore = entry.raw;
            } else {
                // Detail categories — already normalized to 0-10
                detailScores.push(entry.raw);
            }
        });

        // Average the detail scores (each category has equal voice)
        const detailAvg = detailScores.length > 0
            ? detailScores.reduce((a, b) => a + b, 0) / detailScores.length
            : 5;

        // Weighted combination
        let finalScore = (baseScore * BASE_WEIGHT) + (detailAvg * DETAIL_WEIGHT);

        // Clamp to 0-10
        finalScore = Math.max(0, Math.min(10, finalScore));

        return Math.round(finalScore * 10) / 10;
    }

    function getTier(score) {
        if (score >= 7.5) return { label: 'Strong Fit — Document Database', class: 'strong', barClass: 'score-strong', emoji: '' };
        if (score >= 6) return { label: 'Good Fit — Document Database', class: 'good', barClass: 'score-good', emoji: '' };
        if (score >= 3) return { label: 'Equal Fit — Evaluate Both', class: 'equal', barClass: 'score-equal', emoji: '' };
        return { label: 'Stronger Fit — Relational Database', class: 'weak', barClass: 'score-weak', emoji: '' };
    }

    function getRecommendation(tier, score) {
        if (tier.class === 'strong') {
            return 'Your requirements align well with a document database approach. The workload characteristics — flexibility, iteration speed, and platform consolidation — favour this model over a traditional relational design.';
        } else if (tier.class === 'good') {
            return 'Most of your requirements point toward a document database, though some aspects may still suit relational patterns. Review the weak-fit signals below to decide how to address them in your architecture.';
        } else if (tier.class === 'equal') {
            return 'Your project has characteristics that suit both approaches. A relational database offers mature tooling for structured, join-heavy workloads; a document database offers flexibility and speed of iteration. Team expertise and your specific data access patterns should guide the decision.';
        } else {
            return 'Your requirements lean toward patterns where relational databases have a natural advantage — structured schemas, complex cross-entity queries, and transactional consistency across many tables. This is a strength of relational, not a weakness of document databases.';
        }
    }

    function getSummary(tier, score) {
        if (tier.class === 'strong') {
            return `<strong>Strong document database fit (${score}/10)</strong><br><br>` +
                'Your project\'s workload characteristics — flexible schemas, rapid iteration, nested or polymorphic data, and real-time operational needs — align strongly with a document database model. ' +
                'In this kind of architecture, documents map naturally to how the application thinks about data: as rich, nested objects rather than rows distributed across many tables joined at query time. This typically means fewer round trips, simpler application code, and faster development cycles.<br><br>' +
                'A relational database could still serve parts of this workload, but you would likely end up working around its constraints — adding JSONB columns, caching layers, or denormalised views to achieve the flexibility and performance the project demands. ' +
                'The document model gives you that flexibility natively, and a platform like MongoDB Atlas adds search, vector search, change streams, and time-series support without bolting on separate tools.<br><br>' +
                '<strong>Where relational still has an edge:</strong> If any part of your system requires complex cross-entity reporting, regulatory audit trails with strict referential integrity, or heavy ad-hoc analytical querying, consider whether a relational store should handle that specific slice — even within a predominantly document-oriented architecture.';
        } else if (tier.class === 'good') {
            return `<strong>Good document database fit (${score}/10)</strong><br><br>` +
                'Most of your requirements point toward a document database — flexible schemas, evolving data models, and operational agility are core strengths of this approach. ' +
                'Your developers can evolve the data model as requirements change without migration scripts or DBA bottlenecks, and the document structure keeps related data together for fast reads.<br><br>' +
                'That said, some of your selections suggest areas where relational patterns may still add value. Multi-document ACID transactions and aggregation pipelines can bridge many of these gaps, but it\'s worth evaluating whether specific components — particularly those involving complex cross-entity joins or analytical workloads — might be better served by a relational database alongside the document store.<br><br>' +
                '<strong>Where relational still has an edge:</strong> Mature tooling for complex reporting, well-established ORM ecosystems, and decades of optimisation for normalised, join-heavy query patterns. Review the weak-fit signals in the breakdown to see if any of these apply to your project.';
        } else if (tier.class === 'equal') {
            return `<strong>Consider both approaches carefully (${score}/10)</strong><br><br>` +
                'Your project sits in the middle of the spectrum — it has genuine characteristics that suit both document and relational databases.<br><br>' +
                '<strong>Document database strengths for your case:</strong> Flexible schemas, rapid iteration, document-oriented data, real-time operations, and platform consolidation. If your roadmap prioritises speed of delivery and schema agility, this model reduces friction.<br><br>' +
                '<strong>Relational database strengths for your case:</strong> Complex cross-entity joins, ad-hoc analytical querying, stored procedure logic, and strict referential integrity. If your workload is heavily join-dependent or requires mature BI/reporting tooling, relational databases have a natural advantage here.<br><br>' +
                'Consider running a proof-of-concept with both approaches on a representative slice of your data to see which model maps more naturally to your domain and access patterns. Team expertise should also weigh heavily in this decision.';
        } else {
            return `<strong>Relational database is likely the stronger fit (${score}/10)</strong><br><br>` +
                'Your project\'s requirements lean toward patterns where relational databases excel: complex entity relationships, cross-table analytical queries, strict referential integrity, and structured, stable schemas. These are genuine strengths of relational systems — not limitations of document databases, but areas where decades of relational optimisation pay off.<br><br>' +
                '<strong>Where relational works well for you:</strong> Normalised data models with complex joins, BI and reporting workloads, stored procedure logic, regulatory audit trails, and ERP-style transactional processing. If these are your primary access patterns, a relational database gives you the most mature tooling and ecosystem.<br><br>' +
                '<strong>Where a document database might still help:</strong> Even in a relational-first architecture, a document store can complement specific use cases — an operational data layer for low-latency reads, a flexible store for a microservice that doesn\'t share the relational constraints, or a cache-replacement layer. Consider whether any part of your system would benefit from this hybrid approach.';
        }
    }

        const featureMap = [
            {

                desc: 'Native vector search for AI/RAG workloads — store embeddings alongside operational data, run similarity searches, and power agentic AI with short and long-term memory, all without a separate vector database.'
            },
            {
                triggers: ['text_search', 'digital_ux', 'digital_app', 'search_engine_bolt'],
                feature: 'Atlas Search',

            {

                triggers: ['always_on', 'geo_distributed', 'cloud_portability'],

            },
            {
                triggers: ['temporal_data'],
                feature: 'Time Series Collections',
                desc: 'Purpose-built storage for time-stamped data with automatic bucketing, optimized compression, and efficient window-based queries — ideal for IoT, telemetry, financial ticks, and temporal versioning.'
            },
            {
                triggers: ['ddd', 'few_tables_low_card', 'polymorphic', 'polymorphic_store', 'consolidate_stores', 'no_flatten', 'jsonb_columns', 'flatten_xml'],
                feature: 'Flexible Document Model',
                desc: 'Store data the way your application uses it — as rich, nested documents with arrays and sub-documents. No ORM impedance mismatch, no joins at query time. Schema validation rules give you control without rigidity.'
            },
            {
                triggers: ['rigid_schema', 'eliminate_migrations', 'schema_versioning'],
                feature: 'Schema Flexibility with Governance',
                desc: 'Evolve your schema without downtime migrations or ALTER TABLE locks. MongoDB\'s schema validation lets you enforce structure where needed, and tools like Liquibase and Mongock provide versioned migration workflows for enterprise governance.'

                desc: 'A fully managed platform that consolidates database, search, vector, streaming, and triggers into a single service. Reduces operational overhead, eliminates third-party tool sprawl, and lets developers focus on building instead of managing infrastructure.'
            },
            {
                triggers: ['operational_layer', 'offload_layer', 'odl_heavy_reads', 'new_shield', 'read_views', 'slow_perf'],
                feature: 'Operational Data Layer Pattern',
                desc: 'MongoDB excels as a fast read/write layer that shields legacy backends from heavy traffic. Its flexible schema lets you aggregate data from multiple core systems into a single store, serving low-latency queries without touching origin systems.'
            },
            {
                triggers: ['decouple_logic', 'logic_app_level', 'api_microservices', 'monolith_to_ddd', 'modular_monolith', 'modernise_arch'],
                feature: 'Microservices & Application-Tier Architecture',
                desc: 'MongoDB\'s document-per-service model naturally fits microservices. Each service owns its data, business logic stays in the application tier, and the flexible schema evolves independently per service boundary without cross-team migration coordination.'
            }
        ];

        const matchedFeatures = featureMap.filter(f =>
            f.triggers.some(t => allSelected.has(t))
        );

        if (matchedFeatures.length === 0) {
            return '<strong>Relevant Platform Capabilities</strong><br><br>' +
                'If you choose a document database approach, MongoDB Atlas offers a unified platform covering database, search, vector search, streaming, and serverless functions — managed as a single service across major clouds and on-prem.';
        }

        let html = '<strong>Relevant Platform Capabilities</strong><br><br>' +
            'Based on your selections, these capabilities are most relevant if you go with a document database approach:<br><br>';

        matchedFeatures.forEach(f => {
            html += `<div style="margin-bottom: 14px;">` +
                `<strong style="color: #00ed64;">${f.feature}</strong><br>` +
                `<span style="color: #aaa;">${f.desc}</span></div>`;
        });

        return html;
    }

                <!-- YOUR SCORE POINTER -->

    function showResults() {
        const score = computeFinalScore();
        const tier = getTier(score);

        let html = `
            <div class="scorecard">
                <div class="score-header">Database Fit Score</div>
                <div class="score-bar-container">
                    <div class="score-bar ${tier.barClass}" style="width: 0%" id="score-bar">
                        ${score} / 10
                    </div>
                </div>
                <div class="score-tier ${tier.class}">${tier.label}</div>
                <div class="score-detail">${getRecommendation(tier, score)}</div>

                <button class="dropdown-toggle" onclick="toggleBreakdown()">
                    <span class="dropdown-arrow" id="breakdown-arrow">&#9654;</span>
                    Breakdown by Category
                </button>
                <div class="dropdown-content" id="breakdown-content">
                    <div class="score-breakdown">
        `;

        Object.keys(categoryScores).forEach(cat => {
            const entry = categoryScores[cat];
            html += `<div style="margin-top: 12px;"><strong style="color: #ccc;">${cat}</strong></div>`;
            entry.selected.forEach(item => {
                const scoreClass = item.score > 0 ? 'positive' : item.score < 0 ? 'negative' : 'neutral';
                const prefix = item.score > 0 ? '+' : '';
                html += `
                    <div class="breakdown-item">
                        <span class="breakdown-label">${item.label}</span>
                        <span class="breakdown-score ${scoreClass}">${prefix}${item.score}</span>
                    </div>
                `;
            });
        });

        html += `
                    </div>
                </div>
                <div class="score-summary">
                    ${getSummary(tier, score)}
                </div>
                ${getSpectrumDiagram(score, tier)}
                <div class="score-summary" style="border-left-color: #00ed64;">
                    ${getAtlasFeatures()}
                </div>
                <button class="restart-btn" onclick="restart()">Start Over</button>
            </div>
        `;

        const msg = addMessage(html, 'bot');

        // Scroll scorecard into view and animate bar
        setTimeout(() => {
            msg.scrollIntoView({ behavior: 'smooth', block: 'end' });
            const bar = document.getElementById('score-bar');
            if (bar) bar.style.width = `${Math.max(score * 10, 15)}%`;
        }, 100);
    }

    function toggleBreakdown() {
        const content = document.getElementById('breakdown-content');
        const arrow = document.getElementById('breakdown-arrow');
        content.classList.toggle('open');
        arrow.classList.toggle('open');
    }

    function restart() {
        answers = {};
        categoryScores = {};
        currentQuestion = null;
        chat.innerHTML = '';
        start();
    }

    function start() {
        addMessage("Welcome! I'll help you evaluate whether a <strong>document database</strong> or a <strong>relational database</strong> is the better fit for your project. I'll ask you a series of questions and calculate a fit score from <strong>0 to 10</strong>.<br><br><strong>Score Guide:</strong><br>• 7.5 – 10: Strong fit for a document database<br>• 6 – 7.5: Good fit for a document database<br>• 3 – 5.5: Could go either way — evaluate both<br>• 0 – 2.5: Relational database is likely the stronger fit", 'bot');
        setTimeout(() => showQuestion('q1'), 600);
    }

    // Start the bot
    start();
    </script>
